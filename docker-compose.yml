version: "3.9"

services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dash
    ports:
      - "8050:8050"
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  # Note: En production, utiliser Supabase (cloud gratuit)
  # Ce service est uniquement pour le développement local
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-lubricants}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-lubricants_pricing}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
