name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Tests & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-api.txt

      - name: Install runtime deps (slim — sans TensorFlow/PyTorch)
        run: |
          pip install --upgrade pip
          pip install \
            pandas==2.2.0 \
            numpy==1.26.4 \
            pyarrow==15.0.0 \
            scikit-learn==1.4.1.post1 \
            fastapi==0.110.0 \
            uvicorn==0.27.1 \
            pydantic==2.6.1 \
            loguru==0.7.2 \
            pytest==8.0.2 \
            pytest-cov==4.1.0 \
            httpx==0.27.0

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=modules/m2_margin_analysis \
            --cov=modules/m3_simulation_engine \
            --cov-report=term-missing \
            --cov-fail-under=50 \
            -v
        env:
          PYTHONPATH: .

      - name: Test API endpoints (smoke test)
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from fastapi.testclient import TestClient
          from modules.m7_api.main import app
          client = TestClient(app, raise_server_exceptions=False)
          routes = [
              ('GET', '/'),
              ('GET', '/api/kpis'),
              ('GET', '/api/products'),
              ('GET', '/api/pricing/benchmark'),
              ('GET', '/api/gap/sku'),
              ('GET', '/api/gap/region'),
          ]
          failed = []
          for method, path in routes:
              r = client.get(path)
              if r.status_code >= 400:
                  failed.append(f'{path} -> {r.status_code}')
          if failed:
              print('FAILED:', failed)
              sys.exit(1)
          print(f'All {len(routes)} smoke tests passed')
          "
        env:
          PYTHONPATH: .

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f Dockerfile.api -t lubricants-api:ci .

      - name: Build Dashboard image
        run: docker build -f Dockerfile.dash -t lubricants-dash:ci .
